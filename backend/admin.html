<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexAgent Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e8e6e0; min-height: 100vh; }

  /* LOGIN */
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-box { background: #16161f; border: 1px solid #2a2a35; border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; text-align: center; }
  .login-box h1 { font-size: 24px; font-weight: 700; color: #7c6af7; margin-bottom: 4px; }
  .login-box p { font-size: 13px; color: #666; margin-bottom: 28px; }
  .login-box input { width: 100%; background: #1e1e2e; border: 1px solid #2a2a35; color: #e8e6e0; padding: 12px 16px; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 12px; }
  .login-box input:focus { border-color: #7c6af7; }
  .login-box button { width: 100%; background: #7c6af7; color: white; border: none; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .login-error { color: #f87171; font-size: 13px; margin-bottom: 12px; display: none; }

  /* DASHBOARD */
  .dashboard { display: none; }
  .topbar { background: #13131a; border-bottom: 1px solid #2a2a35; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-size: 18px; font-weight: 700; color: #7c6af7; }
  .topbar-logo span { color: #e8e6e0; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .admin-badge { background: #2a2050; color: #7c6af7; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.5px; }
  .logout-btn { background: none; border: 1px solid #2a2a35; color: #666; padding: 7px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .logout-btn:hover { border-color: #f87171; color: #f87171; }

  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }
  .page-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #666; margin-bottom: 28px; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: #16161f; border: 1px solid #2a2a35; border-radius: 12px; padding: 20px; }
  .stat-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .stat-value { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
  .stat-sub { font-size: 12px; color: #555; }
  .stat-card.purple .stat-value { color: #7c6af7; }
  .stat-card.green .stat-value  { color: #4ade80; }
  .stat-card.amber .stat-value  { color: #fbbf24; }
  .stat-card.blue .stat-value   { color: #60a5fa; }

  /* CHARTS ROW */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .chart-card { background: #16161f; border: 1px solid #2a2a35; border-radius: 12px; padding: 24px; }
  .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 20px; color: #e8e6e0; }

  /* VERDICT BARS */
  .verdict-bar { margin-bottom: 14px; }
  .verdict-bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .verdict-bar-track { height: 8px; background: #2a2a35; border-radius: 4px; overflow: hidden; }
  .verdict-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

  /* LANGUAGE BARS */
  .lang-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .lang-name { font-size: 12px; color: #888; width: 70px; flex-shrink: 0; }
  .lang-track { flex: 1; height: 6px; background: #2a2a35; border-radius: 3px; overflow: hidden; }
  .lang-fill { height: 100%; background: #7c6af7; border-radius: 3px; transition: width 1s ease; }
  .lang-count { font-size: 12px; color: #666; width: 30px; text-align: right; flex-shrink: 0; }

  /* TABLES */
  .tables-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .table-card { background: #16161f; border: 1px solid #2a2a35; border-radius: 12px; padding: 24px; }
  .table-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .table-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1e1e2e; }
  .table-row:last-child { border-bottom: none; }
  .table-avatar { width: 32px; height: 32px; border-radius: 8px; background: #2a2a40; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #7c6af7; flex-shrink: 0; }
  .table-main { flex: 1; min-width: 0; }
  .table-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .table-meta { font-size: 11px; color: #666; margin-top: 1px; }
  .verdict-pill { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
  .vp-Safe    { background: #0d2818; color: #4ade80; }
  .vp-Caution { background: #2a1f00; color: #fbbf24; }
  .vp-Danger  { background: #2a0d0d; color: #f87171; }
  .vp-pending { background: #2a1f00; color: #fbbf24; }
  .vp-confirmed { background: #0d2818; color: #4ade80; }

  /* BOOKINGS TABLE */
  .bookings-card { background: #16161f; border: 1px solid #2a2a35; border-radius: 12px; padding: 24px; margin-bottom: 28px; }

  /* REFRESH */
  .refresh-btn { background: #1e1e2e; border: 1px solid #2a2a35; color: #888; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { border-color: #7c6af7; color: #7c6af7; }

  /* LOADER */
  .dash-loader { text-align: center; padding: 80px 20px; color: #666; }
  .dash-spinner { width: 40px; height: 40px; border: 3px solid #2a2a35; border-top-color: #7c6af7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row, .tables-row { grid-template-columns: 1fr; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>LexAgent</h1>
    <p>Admin Dashboard — Restricted Access</p>
    <div class="login-error" id="loginError"></div>
    <input type="password" id="adminPassword" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">Access Dashboard</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">Lex<span>Agent</span></div>
    <div class="topbar-right">
      <span class="admin-badge">ADMIN</span>
      <button class="refresh-btn" onclick="loadStats()">↻ Refresh</button>
      <button class="logout-btn" onclick="adminLogout()">Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="dashMain">
    <div class="dash-loader">
      <div class="dash-spinner"></div>
      <p>Loading dashboard...</p>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:8000';
  let adminToken = localStorage.getItem('lexagent_admin_token') || null;

  // Auto login if token exists
  if (adminToken) showDashboard();

  async function adminLogin() {
    const password = document.getElementById('adminPassword').value;
    const errEl = document.getElementById('loginError');
    if (!password) { errEl.textContent = 'Please enter password'; errEl.style.display = 'block'; return; }

    try {
      const res = await fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Invalid password');
      adminToken = data.token;
      localStorage.setItem('lexagent_admin_token', adminToken);
      showDashboard();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
  }

  function adminLogout() {
    adminToken = null;
    localStorage.removeItem('lexagent_admin_token');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
  }

  async function loadStats() {
    const main = document.getElementById('dashMain');
    main.innerHTML = `<div class="dash-loader"><div class="dash-spinner"></div><p>Loading dashboard...</p></div>`;

    try {
      const res = await fetch(`${API}/admin/stats`, {
        headers: { 'Authorization': `Bearer ${adminToken}` }
      });
      if (!res.ok) throw new Error('Failed to load stats');
      const d = await res.json();
      renderDashboard(d);
    } catch (err) {
      main.innerHTML = `<div style="text-align:center;padding:80px;color:#f87171;">Failed to load: ${err.message}</div>`;
    }
  }

  function renderDashboard(d) {
    const total = (d.verdicts.Safe || 0) + (d.verdicts.Caution || 0) + (d.verdicts.Danger || 0);
    const safeW   = total ? Math.round((d.verdicts.Safe   || 0) / total * 100) : 0;
    const cauW    = total ? Math.round((d.verdicts.Caution || 0) / total * 100) : 0;
    const danW    = total ? Math.round((d.verdicts.Danger  || 0) / total * 100) : 0;

    const maxLang = Math.max(...Object.values(d.languages || {1:1}));
    const langHtml = Object.entries(d.languages || {}).slice(0, 8).map(([lang, count]) => `
      <div class="lang-bar">
        <div class="lang-name">${lang || 'hindi'}</div>
        <div class="lang-track"><div class="lang-fill" style="width:${Math.round(count/maxLang*100)}%"></div></div>
        <div class="lang-count">${count}</div>
      </div>`).join('') || '<p style="color:#666;font-size:13px;">No data yet</p>';

    const usersHtml = (d.recent_users || []).map(u => `
      <div class="table-row">
        <div class="table-avatar">${(u.name || u.email || 'U').charAt(0).toUpperCase()}</div>
        <div class="table-main">
          <div class="table-name">${u.email}</div>
          <div class="table-meta">${u.name || 'No name'} • ${formatDate(u.created_at)}</div>
        </div>
      </div>`).join('') || '<p style="color:#666;font-size:13px;padding:12px 0;">No users yet</p>';

    const analysesHtml = (d.recent_analyses || []).map(r => `
      <div class="table-row">
        <div class="table-avatar">📄</div>
        <div class="table-main">
          <div class="table-name">${r.document_name}</div>
          <div class="table-meta">${r.language || 'hindi'} • Score: ${r.risk_score}/100 • ${formatDate(r.created_at)}</div>
        </div>
        <div class="verdict-pill vp-${r.overall_verdict}">${r.overall_verdict}</div>
      </div>`).join('') || '<p style="color:#666;font-size:13px;padding:12px 0;">No analyses yet</p>';

    const bookingsHtml = (d.recent_bookings || []).map(b => `
      <div class="table-row">
        <div class="table-avatar">👨‍💼</div>
        <div class="table-main">
          <div class="table-name">${b.ca_name}</div>
          <div class="table-meta">${b.user_name} • ₹${b.amount} • ${formatDate(b.created_at)}</div>
        </div>
        <div class="verdict-pill vp-${b.status}">${b.status}</div>
      </div>`).join('') || '<p style="color:#666;font-size:13px;padding:12px 0;">No bookings yet</p>';

    document.getElementById('dashMain').innerHTML = `

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-sub">Welcome back, Admin — here's what's happening with LexAgent</div>
        </div>
      </div>

      <!-- STAT CARDS -->
      <div class="stats-grid">
        <div class="stat-card purple">
          <div class="stat-label">Total Users</div>
          <div class="stat-value">${d.total_users}</div>
          <div class="stat-sub">+${d.monthly_users} this month</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Total Analyses</div>
          <div class="stat-value">${d.total_analyses}</div>
          <div class="stat-sub">+${d.monthly_analyses} this month</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-label">CA Bookings</div>
          <div class="stat-value">${d.total_bookings}</div>
          <div class="stat-sub">${d.pending_bookings} pending</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-label">Revenue (Est.)</div>
          <div class="stat-value">₹${(d.total_bookings * 499).toLocaleString('en-IN')}</div>
          <div class="stat-sub">From CA bookings</div>
        </div>
      </div>

      <!-- CHARTS -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Verdict Breakdown</div>
          <div class="verdict-bar">
            <div class="verdict-bar-label"><span style="color:#4ade80;">Safe</span><span>${d.verdicts.Safe || 0}</span></div>
            <div class="verdict-bar-track"><div class="verdict-bar-fill" style="width:${safeW}%;background:#4ade80;"></div></div>
          </div>
          <div class="verdict-bar">
            <div class="verdict-bar-label"><span style="color:#fbbf24;">Caution</span><span>${d.verdicts.Caution || 0}</span></div>
            <div class="verdict-bar-track"><div class="verdict-bar-fill" style="width:${cauW}%;background:#fbbf24;"></div></div>
          </div>
          <div class="verdict-bar">
            <div class="verdict-bar-label"><span style="color:#f87171;">Danger</span><span>${d.verdicts.Danger || 0}</span></div>
            <div class="verdict-bar-track"><div class="verdict-bar-fill" style="width:${danW}%;background:#f87171;"></div></div>
          </div>
          <div style="margin-top:16px;font-size:12px;color:#555;">Total analyses: ${total}</div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Language Usage</div>
          ${langHtml}
        </div>
      </div>

      <!-- TABLES -->
      <div class="tables-row">
        <div class="table-card">
          <div class="table-title">Recent Users</div>
          ${usersHtml}
        </div>
        <div class="table-card">
          <div class="table-title">Recent Analyses</div>
          ${analysesHtml}
        </div>
      </div>

      <!-- BOOKINGS -->
      <div class="bookings-card">
        <div class="table-title">Recent CA Bookings</div>
        ${bookingsHtml}
      </div>`;
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  document.getElementById('adminPassword') && document.getElementById('adminPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') adminLogin();
  });
</script>
</body>
</html>
